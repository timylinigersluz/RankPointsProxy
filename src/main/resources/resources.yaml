# Log-Level
# OFF = keine Logs
# ERROR = nur Fehler
# WARN = Warnungen + Fehler
# INFO = normale Standard-Logs
# DEBUG = zusätzliche Debug-Logs
# TRACE = sehr detaillierte Logs

log:
  level: INFO

points:
  interval-seconds: 60                # wie oft Punkte für Spielzeit vergeben werden
  amount: 1                           # Punkte pro Intervall
  promotion-interval-seconds: 60      # wie oft Promotionen geprüft werden

storage:
  autosave-interval-seconds: 300      # alle 5 Minuten offline_players.json speichern

staff:
  cache-ttl-seconds: 60
  sync-interval-seconds: 15
  give-points: false

  # Name des LuckPerms-Tracks für Staff
  track: "staff"

  # Technische Basisgruppe der Staff-Laufbahn
  default-group: "default_staff"

  # Echte Staff-Ränge in aufsteigender Reihenfolge
  ranks:
    - "moderator"
    - "builder"
    - "admin"
    - "tec"
    - "owner"

default:
  # Name des LuckPerms-Tracks für normale Spieler
  track: "player"

  # Technische Basisgruppe der normalen Laufbahn
  default-group: "default" LuckPerms-Laufbahn für normale Spieler