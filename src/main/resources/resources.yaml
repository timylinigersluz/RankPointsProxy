# Log-Level
# OFF = keine Logs
# ERROR = nur Fehler
# WARN = Warnungen + Fehler
# INFO = normale Standard-Logs
# DEBUG = zusätzliche Debug-Logs
# TRACE = sehr detaillierte Logs

log:
  level: INFO

points:
  interval-seconds: 60                # wie oft Punkte für Spielzeit vergeben werden
  amount: 1                           # Punkte pro Intervall
  promotion-interval-seconds: 60      # wie oft Promotionen geprüft werden

storage:
  autosave-interval-seconds: 300      # alle 5 Minuten offline_players.json speichern

staff:
  cache-ttl-seconds: 60               # wie lange Stafflist im Speicher gecached bleibt
  sync-interval-seconds: 15           # Intervall für den Abgleich mit der Stafflist
  give-points: false                  # false = wie bisher, true = Staff kriegt Punkte
  group: "staff"                      # LuckPerms-Laufbahn für Staff

default:
  group: "player"                    # LuckPerms-Laufbahn für normale Spieler